# AgentGraphed stack for Coolify (build_pack = dockercompose).
#
#   agentgraphed  — the dashboard, built from ./Dockerfile, reads sessions (ro)
#   syncthing     — the sync hub; workstations push their sessions here
#   ingest-cron   — pokes the ingest endpoint every 5 min so data stays fresh
#
# Coolify builds + runs this on a single node, so the named volumes are
# node-local — which is exactly what SQLite (the `db` volume) requires.

services:
  agentgraphed:
    build:
      context: .
    environment:
      # Aggregation roots: one subfolder per machine, populated by syncthing.
      - AGENTGRAPHED_DATA_DIR=/data
      - AGENTGRAPHED_CLAUDE_DIR=/sources/claude
      - AGENTGRAPHED_CODEX_DIR=/sources/codex
      - PORT=3737
      - HOSTNAME=0.0.0.0
    volumes:
      - db:/data                # node-local; SQLite WAL must not be on NFS/CIFS
      - sources:/sources:ro     # read-only: never write into synced session data
    restart: unless-stopped
    # Explicit Traefik routing (mirrors the existing `diagrams` app): the app
    # has no built-in auth, so the route ALWAYS goes through the Authentik
    # forward-auth middleware. Dormant until agentgraphed.sachshaus.net resolves
    # (Cloudflare DNS/tunnel) AND the Authentik provider for that host exists.
    labels:
      - traefik.enable=true
      - traefik.http.middlewares.gzip.compress=true
      - traefik.http.middlewares.authentik.forwardauth.address=https://auth.sachshaus.net/outpost.goauthentik.io/auth/traefik
      - traefik.http.middlewares.authentik.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.authentik.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version
      - traefik.http.routers.agentgraphed.entryPoints=http
      - traefik.http.routers.agentgraphed.middlewares=authentik,gzip
      - traefik.http.routers.agentgraphed.rule=Host(`agentgraphed.sachshaus.net`)
      - traefik.http.routers.agentgraphed.service=agentgraphed
      - traefik.http.services.agentgraphed.loadbalancer.server.port=3737

  syncthing:
    image: syncthing/syncthing:1
    hostname: agentgraphed-hub
    environment:
      # Run as root: Coolify creates the named volumes root-owned, and a
      # non-root PUID can't write its cert/config into them (crash loop on
      # "permission denied … cert.pem"). Files it writes to /sources are then
      # root-owned, which agentgraphed (also root) reads fine.
      - PUID=0
      - PGID=0
    volumes:
      - st-config:/var/syncthing/config
      - sources:/var/syncthing/sources   # same volume agentgraphed reads at /sources
    ports:
      - "22000:22000/tcp"   # sync protocol
      - "22000:22000/udp"   # QUIC
      - "21027:21027/udp"   # local discovery
      # GUI 8384 intentionally NOT published — internal only (reach via coolify exec / SSH tunnel)
    restart: unless-stopped

  ingest-cron:
    image: curlimages/curl:latest
    depends_on:
      - agentgraphed
    entrypoint: ["sh", "-c"]
    command:
      - "while true; do sleep 300; curl -fsS -m 120 -X POST http://agentgraphed:3737/api/ingest-local >/dev/null 2>&1 || true; done"
    restart: unless-stopped

volumes:
  db:
  sources:
  st-config:
